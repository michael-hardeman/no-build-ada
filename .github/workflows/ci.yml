name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GNAT
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat

      - name: Bootstrap and run examples
        run: |
          ./bootstrap.sh
          ./examples/build_all

      - name: Bootstrap and run tests
        run: |
          ./bootstrap_tests.sh
          ./tests/build_tests

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: alire-project/setup-alire@v4

      - name: Install GNAT via Alire and export to PATH
        shell: bash
        run: |
          # `alr exec` refuses to run outside an Alire workspace, so create
          # a throwaway one in $RUNNER_TEMP just to give it a manifest.
          cd "$RUNNER_TEMP"
          alr -n init --bin ci_throwaway
          cd ci_throwaway
          alr toolchain --select gnat_native gprbuild
          # Ask alr where the toolchain ended up and add it to $PATH for
          # subsequent steps so we can call gnatmake without `alr exec`.
          GNAT_BIN=$(alr exec -- bash -c 'dirname "$(command -v gnatmake)"')
          echo "GNAT bin: $GNAT_BIN"
          echo "$GNAT_BIN" >> "$GITHUB_PATH"

      - name: Bootstrap and run examples
        run: |
          ./bootstrap.sh
          ./examples/build_all

      - name: Bootstrap and run tests
        run: |
          ./bootstrap_tests.sh
          ./tests/build_tests

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    # ADA_INCLUDE_PATH adds windows/ to every gnatmake's source search --
    # including nested invocations from build_all.exe and build_tests.exe,
    # which need it because the injected `with Windows_DL;` (see below)
    # makes every example transitively depend on the shim.
    env:
      ADA_INCLUDE_PATH: windows
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc-ada

      # MinGW on MSYS2 does not ship libdl, so the option-2 path
      # (-largs -ldl) doesn't work.  Use the repo's Windows_DL shim
      # instead, but inject the `with Windows_DL;` into no_build.ads at
      # CI time so we don't have to ship that with-clause to POSIX users.
      # `-Iwindows` then lets gnatmake find the shim's compilation unit.
      - name: Inject `with Windows_DL;` into no_build.ads
        run: |
          { printf 'with Windows_DL;\npragma Warnings (Off, Windows_DL);\n'; \
            cat no_build.ads; } > no_build.ads.tmp
          mv no_build.ads.tmp no_build.ads
          head -3 no_build.ads

      - name: Build and run examples
        run: |
          mkdir -p examples/obj
          gnatmake -D examples/obj -I. -Iwindows examples/build_all.adb -o examples/build_all
          ./examples/build_all.exe

      - name: Build and run tests
        run: |
          mkdir -p tests/obj
          gnatmake -D tests/obj -I. -Iwindows -Itests tests/build_tests.adb -o tests/build_tests
          ./tests/build_tests.exe
